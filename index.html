<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 教學訓練計畫主持人工作坊</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            min-height: 100vh;
            background:
                linear-gradient(135deg, rgba(26,5,51,0.75) 0%, rgba(74,26,122,0.7) 25%, rgba(123,45,142,0.65) 50%, rgba(168,85,247,0.6) 75%, rgba(192,132,252,0.55) 100%),
                url('263.jpg') center/cover no-repeat fixed;
            color: #fff;
            overflow-x: hidden;
        }

        /* Animated floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0.3;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 60px 20px 40px;
            position: relative;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 8px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            animation: fadeInDown 0.8s ease;
        }

        .hero h1 {
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(to right, #fff, #e8b4f8, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            line-height: 1.3;
            animation: fadeInUp 1s ease;
        }

        .hero-subtitle {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
            animation: fadeInUp 1.2s ease;
        }

        /* Info Cards */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 28px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeInUp 1s ease both;
        }

        .info-card:nth-child(1) { animation-delay: 0.1s; }
        .info-card:nth-child(2) { animation-delay: 0.2s; }
        .info-card:nth-child(3) { animation-delay: 0.3s; }

        .info-card:hover {
            transform: translateY(-8px) scale(1.02);
            background: rgba(255, 255, 255, 0.18);
            box-shadow: 0 20px 60px rgba(168, 85, 247, 0.4);
        }

        .info-card .icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            display: block;
        }

        .info-card .label {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .info-card .value {
            font-size: 1.3rem;
            font-weight: 700;
        }

        /* Form Section */
        .form-section {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 40px;
            margin: 40px 0;
            animation: fadeInUp 1.2s ease both;
        }

        .form-section h2 {
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(to right, #e8b4f8, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.9);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 1rem;
            font-family: 'Noto Sans TC', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #a855f7;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
        }

        .form-group select option {
            background: #2d1854;
            color: #fff;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* Radio Group */
        .radio-group {
            display: flex;
            gap: 16px;
            margin-top: 8px;
        }

        .radio-option {
            flex: 1;
            position: relative;
        }

        .radio-option input[type="radio"] {
            display: none;
        }

        .radio-option label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            text-align: center;
        }

        .radio-option input[type="radio"]:checked + label {
            border-color: #a855f7;
            background: rgba(168, 85, 247, 0.3);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
        }

        .radio-option label:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #a855f7, #7c3aed, #6d28d9);
            color: #fff;
            font-size: 1.15rem;
            font-weight: 700;
            font-family: 'Noto Sans TC', sans-serif;
            cursor: pointer;
            transition: all 0.4s ease;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(168, 85, 247, 0.5);
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        /* Contact Section */
        .contact-section {
            text-align: center;
            padding: 40px 20px;
            animation: fadeInUp 1.4s ease both;
        }

        .contact-section h3 {
            font-size: 1.3rem;
            margin-bottom: 20px;
        }

        .contact-cards {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .contact-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 20px 30px;
            transition: all 0.3s ease;
        }

        .contact-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(168, 85, 247, 0.3);
        }

        .contact-card .emoji {
            font-size: 1.5rem;
            margin-bottom: 6px;
            display: block;
        }

        .contact-card .info {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.85);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .hero h1 { font-size: 1.8rem; }
            .form-row { grid-template-columns: 1fr; }
            .form-section { padding: 24px; }
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Floating Particles -->
    <div class="particles" id="particles"></div>

    <div class="container">

        <!-- Hero -->
        <section class="hero">
            <div class="hero-badge">✨ 奇美醫院教學部主辦 ✨</div>
            <h1>🎓 教學訓練計畫<br>主持人工作坊</h1>
            <p class="hero-subtitle">📢 提升教學品質 · 培育專業人才 · 共創卓越未來</p>
        </section>

        <!-- Info Cards -->
        <section class="info-grid">
            <div class="info-card">
                <span class="icon">📅</span>
                <div class="label">活動日期</div>
                <div class="value">2026 / 01 / 25</div>
            </div>
            <div class="info-card">
                <span class="icon">⏰</span>
                <div class="label">活動時間</div>
                <div class="value">09:00 ~ 16:00</div>
            </div>
            <div class="info-card">
                <span class="icon">📍</span>
                <div class="label">活動地點</div>
                <div class="value">奇美醫院<br>第五醫療大樓6樓<br>563會議室</div>
            </div>
        </section>

        <!-- Registration Form -->
        <section class="form-section">
            <h2>📝 報名表單</h2>

            <form id="registrationForm" onsubmit="handleSubmit(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label>👤 姓名</label>
                        <input type="text" id="name" placeholder="請輸入您的姓名" required>
                    </div>
                    <div class="form-group">
                        <label>🏥 機構名</label>
                        <input type="text" id="organization" placeholder="請輸入您的機構名稱" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>💼 職稱</label>
                        <input type="text" id="title" placeholder="請輸入您的職稱" required>
                    </div>
                    <div class="form-group">
                        <label>🩺 負責的職類</label>
                        <select id="category" required>
                            <option value="" disabled selected>請選擇職類</option>
                            <option value="藥事">💊 藥事</option>
                            <option value="醫事放射">☢️ 醫事放射</option>
                            <option value="醫事檢驗">🔬 醫事檢驗</option>
                            <option value="護理">🏥 護理</option>
                            <option value="營養">🥗 營養</option>
                            <option value="呼吸治療">🫁 呼吸治療</option>
                            <option value="聽力">👂 聽力</option>
                            <option value="物理治療">🏋️ 物理治療</option>
                            <option value="職能治療">🧩 職能治療</option>
                            <option value="臨床心理">🧠 臨床心理</option>
                            <option value="語言治療">🗣️ 語言治療</option>
                            <option value="其他">📋 其他</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>🎯 您目前是否擔任教學訓練計畫主持人？</label>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" name="isHost" id="hostYes" value="是" required>
                            <label for="hostYes">✅ 是</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" name="isHost" id="hostNo" value="否">
                            <label for="hostNo">❌ 否</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>🖥️ 您預計以何種方式參與？</label>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" name="joinMethod" id="joinPhysical" value="實體" required>
                            <label for="joinPhysical">🏢 實體</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" name="joinMethod" id="joinOnline" value="線上">
                            <label for="joinOnline">💻 線上</label>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>📧 Email</label>
                        <input type="email" id="email" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>📱 聯繫電話</label>
                        <input type="tel" id="phone" placeholder="請輸入您的聯繫電話" required>
                    </div>
                </div>

                <div id="fullMessage" style="display:none; text-align:center; padding:20px; background:rgba(239,68,68,0.2); border:1px solid rgba(239,68,68,0.4); border-radius:16px; margin-bottom:16px;">
                    <span style="font-size:2rem;">🚫</span>
                    <p style="font-size:1.2rem; font-weight:700; margin-top:8px;">報名已額滿</p>
                    <p style="color:rgba(255,255,255,0.7); margin-top:4px;">本活動限額 4 名，目前已額滿，感謝您的關注！</p>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">🚀 立即報名</button>
                <p id="seatInfo" style="text-align:center; margin-top:12px; color:rgba(255,255,255,0.6); font-size:0.9rem;"></p>
            </form>
        </section>

        <!-- Contact -->
        <section class="contact-section">
            <h3>📞 聯絡資訊</h3>
            <div class="contact-cards">
                <div class="contact-card">
                    <span class="emoji">🏛️</span>
                    <div class="info"><strong>主辦單位</strong><br>奇美醫院教學部</div>
                </div>
                <div class="contact-card">
                    <span class="emoji">🙋</span>
                    <div class="info"><strong>聯絡人</strong><br>陳大頭</div>
                </div>
                <div class="contact-card">
                    <span class="emoji">☎️</span>
                    <div class="info"><strong>聯繫電話</strong><br>06-281-2811<br>分機 57112233</div>
                </div>
            </div>
        </section>

        <div class="footer">
            © 2026 奇美醫院教學部 ｜ 教學訓練計畫主持人工作坊 🎓
        </div>
    </div>

    <script>
        // Create floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            const colors = ['#a855f7', '#c084fc', '#e8b4f8', '#7c3aed', '#fff'];

            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 8 + 3;
                const color = colors[Math.floor(Math.random() * colors.length)];
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.background = color;
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 15 + 10) + 's';
                particle.style.animationDelay = (Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }

        createParticles();

        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxcUynRCLrvQSsKUCVETNkMAp9XCI6TC8DAtePHr7Hf5XWvUrX8kipCTFLCKaz_QTCO3Q/exec";
        const MAX_SEATS = 4;

        // JSONP 通用讀取函式（繞過 CORS）
        function jsonpFetch(url, callbackName) {
            return new Promise((resolve) => {
                window[callbackName] = function(data) {
                    resolve(data);
                    delete window[callbackName];
                    var s = document.getElementById(callbackName);
                    if (s) s.remove();
                };
                var script = document.createElement('script');
                script.id = callbackName;
                script.src = url + '?callback=' + callbackName + '&t=' + Date.now();
                script.onerror = function() {
                    resolve(null);
                    delete window[callbackName];
                    script.remove();
                };
                document.body.appendChild(script);
            });
        }

        // 頁面載入時檢查名額
        function checkCapacity() {
            jsonpFetch(APPS_SCRIPT_URL, 'capacityCallback').then(function(json) {
                    if (json && json.status === 'success') {
                        const registered = json.total || 0;
                        const remaining = Math.max(0, MAX_SEATS - registered);
                        const seatInfo = document.getElementById('seatInfo');
                        const submitBtn = document.getElementById('submitBtn');
                        const fullMsg = document.getElementById('fullMessage');
                        const form = document.getElementById('registrationForm');

                        if (remaining <= 0) {
                            // 額滿：停用表單
                            fullMsg.style.display = 'block';
                            submitBtn.disabled = true;
                            submitBtn.textContent = '🚫 已額滿';
                            submitBtn.style.background = 'linear-gradient(135deg, #6b7280, #4b5563)';
                            submitBtn.style.cursor = 'not-allowed';
                            // 停用所有輸入欄位
                            form.querySelectorAll('input, select').forEach(el => el.disabled = true);
                            seatInfo.textContent = '⚠️ 本活動限額 ' + MAX_SEATS + ' 名，已全數額滿';
                            seatInfo.style.color = '#fca5a5';
                        } else {
                            seatInfo.textContent = '📢 剩餘名額：' + remaining + ' / ' + MAX_SEATS;
                            seatInfo.style.color = remaining <= 1 ? '#fbbf24' : 'rgba(255,255,255,0.6)';
                        }
                    }
                });
        }

        checkCapacity();

        // Form submission
        function handleSubmit(e) {
            e.preventDefault();
            const btn = e.target.querySelector('.submit-btn');
            btn.disabled = true;
            btn.textContent = '⏳ 提交中...';

            const data = {
                name: document.getElementById('name').value,
                organization: document.getElementById('organization').value,
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                isHost: document.querySelector('input[name="isHost"]:checked').value,
                joinMethod: document.querySelector('input[name="joinMethod"]:checked').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value
            };

            fetch(APPS_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            })
            .then(() => {
                btn.textContent = '🎉 報名成功！感謝您的報名！';
                btn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
                btn.style.animation = 'pulse 0.5s ease';
                e.target.reset();
                // 重新檢查名額
                setTimeout(() => {
                    checkCapacity();
                    btn.textContent = '🚀 立即報名';
                    btn.style.background = 'linear-gradient(135deg, #a855f7, #7c3aed, #6d28d9)';
                    btn.style.animation = '';
                    btn.disabled = false;
                }, 3000);
            })
            .catch(error => {
                btn.textContent = '❌ 提交失敗，請重試';
                btn.style.background = 'linear-gradient(135deg, #ef4444, #dc2626)';
                btn.disabled = false;
                setTimeout(() => {
                    btn.textContent = '🚀 立即報名';
                    btn.style.background = 'linear-gradient(135deg, #a855f7, #7c3aed, #6d28d9)';
                }, 3000);
            });
        }
    </script>
</body>
</html>
