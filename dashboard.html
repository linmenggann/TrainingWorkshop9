<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 報名現況儀表板 ｜ 教學訓練計畫主持人工作坊</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0533 0%, #4a1a7a 25%, #7b2d8e 50%, #a855f7 75%, #c084fc 100%);
            color: #fff;
            overflow-x: hidden;
        }

        /* Particles */
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .particle { position: absolute; border-radius: 50%; animation: float linear infinite; opacity: 0.25; }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.25; }
            90% { opacity: 0.25; }
            100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }

        /* Header */
        .header {
            text-align: center;
            padding: 50px 20px 30px;
        }
        .header-badge {
            display: inline-block;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            margin-bottom: 16px;
            animation: fadeInDown 0.8s ease;
        }
        .header h1 {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(to right, #fff, #e8b4f8, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeInUp 1s ease;
        }
        .header p {
            color: rgba(255,255,255,0.7);
            margin-top: 10px;
            font-size: 1rem;
            animation: fadeInUp 1.2s ease;
        }

        /* Summary Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .summary-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 28px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
            animation: fadeInUp 0.8s ease both;
        }
        .summary-card:nth-child(1) { animation-delay: 0.05s; }
        .summary-card:nth-child(2) { animation-delay: 0.1s; }
        .summary-card:nth-child(3) { animation-delay: 0.15s; }
        .summary-card:nth-child(4) { animation-delay: 0.2s; }
        .summary-card:hover {
            transform: translateY(-6px) scale(1.03);
            box-shadow: 0 20px 50px rgba(168,85,247,0.4);
        }
        .summary-card .icon { font-size: 2.2rem; margin-bottom: 10px; display: block; }
        .summary-card .number {
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #e8b4f8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .summary-card .label { font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-top: 4px; letter-spacing: 1px; }

        /* Chart Section */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 24px;
            margin: 30px 0;
        }
        .chart-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 28px;
            animation: fadeInUp 1s ease both;
        }
        .chart-card h3 {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.9);
        }

        /* Bar Chart */
        .bar-chart { display: flex; flex-direction: column; gap: 12px; }
        .bar-row { display: flex; align-items: center; gap: 12px; }
        .bar-label { min-width: 90px; font-size: 0.85rem; text-align: right; color: rgba(255,255,255,0.8); }
        .bar-track { flex: 1; height: 32px; background: rgba(255,255,255,0.08); border-radius: 16px; overflow: hidden; position: relative; }
        .bar-fill {
            height: 100%;
            border-radius: 16px;
            transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            min-width: 40px;
        }
        .bar-fill.purple { background: linear-gradient(90deg, #7c3aed, #a855f7); }
        .bar-fill.pink { background: linear-gradient(90deg, #c026d3, #e879f9); }
        .bar-fill.blue { background: linear-gradient(90deg, #2563eb, #60a5fa); }
        .bar-fill.teal { background: linear-gradient(90deg, #0d9488, #2dd4bf); }
        .bar-fill.orange { background: linear-gradient(90deg, #ea580c, #fb923c); }
        .bar-fill.rose { background: linear-gradient(90deg, #e11d48, #fb7185); }

        /* Donut Chart */
        .donut-container { display: flex; align-items: center; justify-content: center; gap: 30px; flex-wrap: wrap; }
        .donut-svg { width: 180px; height: 180px; }
        .donut-legend { display: flex; flex-direction: column; gap: 10px; }
        .legend-item { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; }
        .legend-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
        .legend-value { color: rgba(255,255,255,0.6); font-size: 0.8rem; }

        /* Data Table */
        .table-section {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 28px;
            margin: 30px 0;
            overflow-x: auto;
            animation: fadeInUp 1.2s ease both;
        }
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
        .table-header h3 { font-size: 1.1rem; }
        .refresh-btn {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .refresh-btn:hover { background: rgba(168,85,247,0.3); transform: translateY(-2px); }

        table { width: 100%; border-collapse: collapse; }
        thead th {
            text-align: left;
            padding: 12px 16px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        tbody tr { transition: background 0.2s; }
        tbody tr:hover { background: rgba(255,255,255,0.05); }
        tbody td {
            padding: 14px 16px;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            white-space: nowrap;
        }
        .tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 500;
        }
        .tag-physical { background: rgba(168,85,247,0.25); color: #e8b4f8; }
        .tag-online { background: rgba(59,130,246,0.25); color: #93c5fd; }
        .tag-yes { background: rgba(16,185,129,0.25); color: #6ee7b7; }
        .tag-no { background: rgba(239,68,68,0.2); color: #fca5a5; }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
            color: rgba(255,255,255,0.5);
            font-size: 1.1rem;
        }
        .spinner {
            display: inline-block;
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.15);
            border-top-color: #a855f7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Footer */
        .footer { text-align: center; padding: 30px; color: rgba(255,255,255,0.35); font-size: 0.85rem; }

        /* Animations */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) {
            .header h1 { font-size: 1.7rem; }
            .summary-grid { grid-template-columns: repeat(2, 1fr); }
            .charts-grid { grid-template-columns: 1fr; }
            .summary-card .number { font-size: 2rem; }
        }
    </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="container">

    <!-- Header -->
    <section class="header">
        <div class="header-badge">📊 即時報名數據</div>
        <h1>📋 報名現況儀表板</h1>
        <p>教學訓練計畫主持人工作坊 ｜ 2026/01/25</p>
    </section>

    <!-- Summary Cards -->
    <section class="summary-grid" id="summaryCards">
        <div class="summary-card">
            <span class="icon">👥</span>
            <div class="number" id="totalCount">-</div>
            <div class="label">總報名人數</div>
        </div>
        <div class="summary-card">
            <span class="icon">🏢</span>
            <div class="number" id="physicalCount">-</div>
            <div class="label">實體參與</div>
        </div>
        <div class="summary-card">
            <span class="icon">💻</span>
            <div class="number" id="onlineCount">-</div>
            <div class="label">線上參與</div>
        </div>
        <div class="summary-card">
            <span class="icon">🏥</span>
            <div class="number" id="orgCount">-</div>
            <div class="label">報名機構數</div>
        </div>
    </section>

    <!-- Charts -->
    <section class="charts-grid">
        <div class="chart-card">
            <h3>🩺 各職類報名人數</h3>
            <div class="bar-chart" id="categoryChart">
                <div class="loading"><div class="spinner"></div><br>載入中...</div>
            </div>
        </div>
        <div class="chart-card">
            <h3>🖥️ 參與方式分布</h3>
            <div class="donut-container" id="joinMethodChart">
                <div class="loading"><div class="spinner"></div><br>載入中...</div>
            </div>
        </div>
    </section>

    <!-- Data Table -->
    <section class="table-section">
        <div class="table-header">
            <h3>📝 報名明細</h3>
            <button class="refresh-btn" onclick="fetchData()">🔄 重新整理</button>
        </div>
        <div id="tableContainer">
            <div class="loading"><div class="spinner"></div><br>載入資料中...</div>
        </div>
    </section>

    <div class="footer">
        © 2026 奇美醫院教學部 ｜ 教學訓練計畫主持人工作坊 📊
    </div>
</div>

<script>
    // ===== Particles =====
    (function() {
        const c = document.getElementById('particles');
        const colors = ['#a855f7','#c084fc','#e8b4f8','#7c3aed','#fff'];
        for (let i = 0; i < 25; i++) {
            const p = document.createElement('div');
            p.classList.add('particle');
            const s = Math.random() * 8 + 3;
            p.style.width = s + 'px';
            p.style.height = s + 'px';
            p.style.background = colors[Math.floor(Math.random() * colors.length)];
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (Math.random() * 15 + 10) + 's';
            p.style.animationDelay = (Math.random() * 10) + 's';
            c.appendChild(p);
        }
    })();

    // ===== Config =====
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxcUynRCLrvQSsKUCVETNkMAp9XCI6TC8DAtePHr7Hf5XWvUrX8kipCTFLCKaz_QTCO3Q/exec";

    const BAR_COLORS = ['purple','pink','blue','teal','orange','rose'];

    // ===== JSONP 通用讀取函式（繞過 CORS）=====
    function jsonpFetch(url, callbackName) {
        return new Promise((resolve) => {
            window[callbackName] = function(data) {
                resolve(data);
                delete window[callbackName];
                var s = document.getElementById(callbackName);
                if (s) s.remove();
            };
            var script = document.createElement('script');
            script.id = callbackName;
            script.src = url + '?callback=' + callbackName + '&t=' + Date.now();
            script.onerror = function() {
                resolve(null);
                delete window[callbackName];
                script.remove();
            };
            document.body.appendChild(script);
        });
    }

    // ===== Fetch Data =====
    function fetchData() {
        document.getElementById('tableContainer').innerHTML = '<div class="loading"><div class="spinner"></div><br>載入資料中...</div>';

        jsonpFetch(APPS_SCRIPT_URL, 'dashboardCallback').then(function(json) {
            if (json && json.status === 'success') {
                renderDashboard(json.data);
            } else if (json) {
                showError('讀取資料失敗：' + json.message);
            } else {
                showError('連線失敗，請確認 Apps Script 已部署最新版本');
            }
        });
    }

    function showError(msg) {
        document.getElementById('tableContainer').innerHTML =
            '<div class="loading">❌ ' + msg + '</div>';
    }

    // ===== Render =====
    function renderDashboard(data) {
        // --- Summary ---
        const total = data.length;
        const physical = data.filter(r => r['參與方式'] === '實體').length;
        const online = data.filter(r => r['參與方式'] === '線上').length;
        const orgs = new Set(data.map(r => r['機構名']).filter(Boolean)).size;

        animateNumber('totalCount', total);
        animateNumber('physicalCount', physical);
        animateNumber('onlineCount', online);
        animateNumber('orgCount', orgs);

        // --- Category Bar Chart ---
        const catMap = {};
        data.forEach(r => {
            const cat = r['負責的職類'] || '未填';
            catMap[cat] = (catMap[cat] || 0) + 1;
        });
        const catSorted = Object.entries(catMap).sort((a, b) => b[1] - a[1]);
        const maxCat = catSorted.length ? catSorted[0][1] : 1;

        let barHTML = '';
        catSorted.forEach(([cat, count], i) => {
            const pct = Math.round((count / maxCat) * 100);
            const color = BAR_COLORS[i % BAR_COLORS.length];
            barHTML += `
                <div class="bar-row">
                    <div class="bar-label">${cat}</div>
                    <div class="bar-track">
                        <div class="bar-fill ${color}" style="width: 0%" data-width="${pct}%">${count} 人</div>
                    </div>
                </div>`;
        });
        if (catSorted.length === 0) barHTML = '<div class="loading">尚無報名資料</div>';
        document.getElementById('categoryChart').innerHTML = barHTML;

        // Animate bars
        setTimeout(() => {
            document.querySelectorAll('.bar-fill[data-width]').forEach(el => {
                el.style.width = el.dataset.width;
            });
        }, 100);

        // --- Donut Chart ---
        renderDonut(physical, online);

        // --- Table ---
        renderTable(data);
    }

    // ===== Donut Chart (SVG) =====
    function renderDonut(physical, online) {
        const total = physical + online || 1;
        const pPct = physical / total;
        const oPct = online / total;

        const radius = 70;
        const circumference = 2 * Math.PI * radius;
        const pLen = pPct * circumference;
        const oLen = oPct * circumference;
        const pOffset = 0;
        const oOffset = -pLen;

        const container = document.getElementById('joinMethodChart');

        if (physical === 0 && online === 0) {
            container.innerHTML = '<div class="loading">尚無報名資料</div>';
            return;
        }

        container.innerHTML = `
            <svg class="donut-svg" viewBox="0 0 200 200">
                <circle cx="100" cy="100" r="${radius}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="28"/>
                <circle cx="100" cy="100" r="${radius}" fill="none" stroke="#a855f7" stroke-width="28"
                    stroke-dasharray="${pLen} ${circumference}" stroke-dashoffset="0"
                    transform="rotate(-90 100 100)" style="transition: stroke-dasharray 1.2s ease;">
                    <animate attributeName="stroke-dasharray" from="0 ${circumference}" to="${pLen} ${circumference}" dur="1s" fill="freeze"/>
                </circle>
                <circle cx="100" cy="100" r="${radius}" fill="none" stroke="#60a5fa" stroke-width="28"
                    stroke-dasharray="${oLen} ${circumference}" stroke-dashoffset="${oOffset}"
                    transform="rotate(-90 100 100)" style="transition: stroke-dasharray 1.2s ease;">
                    <animate attributeName="stroke-dasharray" from="0 ${circumference}" to="${oLen} ${circumference}" dur="1s" fill="freeze" begin="0.3s"/>
                </circle>
                <text x="100" y="95" text-anchor="middle" fill="#fff" font-size="32" font-weight="900">${physical + online}</text>
                <text x="100" y="118" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="13">總人數</text>
            </svg>
            <div class="donut-legend">
                <div class="legend-item">
                    <span class="legend-dot" style="background:#a855f7;"></span>
                    <span>🏢 實體</span>
                    <span class="legend-value">${physical} 人 (${Math.round(pPct * 100)}%)</span>
                </div>
                <div class="legend-item">
                    <span class="legend-dot" style="background:#60a5fa;"></span>
                    <span>💻 線上</span>
                    <span class="legend-value">${online} 人 (${Math.round(oPct * 100)}%)</span>
                </div>
            </div>`;
    }

    // ===== Table =====
    function renderTable(data) {
        if (data.length === 0) {
            document.getElementById('tableContainer').innerHTML = '<div class="loading">📭 尚無報名資料</div>';
            return;
        }

        let rows = '';
        data.forEach((r, i) => {
            const joinTag = r['參與方式'] === '實體'
                ? '<span class="tag tag-physical">🏢 實體</span>'
                : '<span class="tag tag-online">💻 線上</span>';
            const hostTag = r['是否擔任教學訓練計畫主持人'] === '是'
                ? '<span class="tag tag-yes">✅ 是</span>'
                : '<span class="tag tag-no">❌ 否</span>';

            rows += `<tr>
                <td>${i + 1}</td>
                <td>${r['姓名'] || ''}</td>
                <td>${r['機構名'] || ''}</td>
                <td>${r['職稱'] || ''}</td>
                <td>${r['負責的職類'] || ''}</td>
                <td>${hostTag}</td>
                <td>${joinTag}</td>
                <td>${r['Email'] || ''}</td>
                <td>${r['聯繫電話'] || ''}</td>
            </tr>`;
        });

        document.getElementById('tableContainer').innerHTML = `
            <table>
                <thead><tr>
                    <th>#</th><th>姓名</th><th>機構名</th><th>職稱</th>
                    <th>職類</th><th>主持人</th><th>參與方式</th><th>Email</th><th>電話</th>
                </tr></thead>
                <tbody>${rows}</tbody>
            </table>`;
    }

    // ===== Animate Number =====
    function animateNumber(id, target) {
        const el = document.getElementById(id);
        const duration = 1000;
        const start = performance.now();

        function update(now) {
            const elapsed = now - start;
            const progress = Math.min(elapsed / duration, 1);
            const eased = 1 - Math.pow(1 - progress, 3);
            el.textContent = Math.round(eased * target);
            if (progress < 1) requestAnimationFrame(update);
        }
        requestAnimationFrame(update);
    }

    // ===== Init =====
    fetchData();
</script>
</body>
</html>
